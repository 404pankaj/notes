name: Deploy Plan the Work

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plan-the-work/package-lock.json
      - run: npm ci
        working-directory: plan-the-work
      - run: npm run build
        working-directory: plan-the-work
        env:
          VITE_BASE_PATH: /notes/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: plan-the-work/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
